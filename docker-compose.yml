services:
  globe-ipt-cityspace:
    build: .
    container_name: globe_ipt_cityspace
    ports:
      - "8050:8050"
      - "8088:8088"
    volumes:
      - .:/app
      - /mnt/c/workspace/ipt-cityspace-engine/offline:/mnt/c/workspace/ipt-cityspace-engine/offline
      - /mnt/c/workspace/ipt-cityspace-engine/ipt_core_clean/online:/app/online
      - /mnt/c/workspace/ipt-cityspace-engine/ipt_core_clean/globe_cityspace_open:/app/globe_cityspace_open
    environment:
      - PYTHONUNBUFFERED=1
